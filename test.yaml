# archbox.yaml — ZariBox config for an Arch Linux dev container
# Run: zaribox apply archbox.yaml

Name: testbox
Backend: podman
Image: archlinux

# Optional: custom home directory (persists across recreations)
HomeDir: /home/yeulten/Documents/Testbox/

Packages:
  - base-devel
  - git
  - neovim
  - starship
  - fish
  - python

# Optional: commands to run after package install
Run:
  - rm -rf ~/yay && git clone https://aur.archlinux.org/yay-bin.git ~/yay && cd ~/yay && makepkg -si --noconfirm
  - echo 'exec fish' >> ~/.bashrc
#- echo 'eval "$(starship init fish)"' >> ~/.config/fish/config.fish

ExtraFlags: --device nvidia.com/gpu=all
