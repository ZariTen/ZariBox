# archbox.toml — ZariBox config for an Arch Linux dev container
# Run: zaribox apply archbox.toml

Name: archbox
Image: archlinux

# Optional: custom home directory (persists across recreations)
HomeDir: /home/yeulten/Documents/Archbox/

Packages:
- base-devel
- git
- neovim
- starship
- fish

# Optional: commands to run after package install
Run:
- rm -rf ~/yay && git clone https://aur.archlinux.org/yay-bin.git ~/yay && cd ~/yay && makepkg -si --noconfirm
- echo 'exec fish' >> ~/.bashrc

# Optional: extra flags passed to `distrobox create`
ExtraFlags: --nvidia
